# --- Terminal -----------------------------------------------------------------

# Shell
shell-integration = "fish"

# Theme
theme = Catppuccin Mocha
custom-shader = boo-cursor.glsl
custom-shader-animation = always

# Font
font-size = 12
font-family = "VictorMono Nerd Font"
# font-family = "FiraCode Nerd Font"


# --- Window -------------------------------------------------------------------

# Behavior
maximize = false
fullscreen = false
window-save-state = always
app-notifications = no-clipboard-copy, no-config-reload

# Visuals
window-theme = ghostty
window-decoration = false
window-colorspace = display-p3
# background-opacity = 0.8
# background-blur-radius = 8

# Padding
window-padding-y = 2
window-padding-x = 16
window-padding-balance = true


# --- KeyBindings --------------------------------------------------------------

# Reload / Toggles
keybind = ctrl+alt+shift+r=reload_config
keybind = ctrl+alt+shift+f=toggle_fullscreen
keybind = ctrl+alt+shift+d=toggle_window_decorations

# Unbinds
keybind = ctrl+k=unbind
keybind = ctrl+enter=unbind
keybind = ctrl+alt+shift+j=unbind

# Clipboard
keybind = performable:ctrl+c=copy_to_clipboard
keybind = ctrl+v=paste_from_clipboard
clipboard-read = allow
clipboard-write = allow


# --- Mouse --------------------------------------------------------------------

mouse-hide-while-typing = true
mouse-scroll-multiplier = 0.35

