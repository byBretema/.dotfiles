# Lovingly typ(o)ed @byBretema

# --- SETTINGS -----------------------------------------------------------------

# Interactions
set -g mouse on
set -g set-clipboard on
set-window-option -g mode-keys vi

# Word separators / delimiters
setw -g word-separators ' @"=()[],:;│|+~!%'
setw -ag word-separators "'"

# Start numbers at 1
set -g base-index 1
set -g pane-base-index 1
set-option -g renumber-windows on
set-window-option -g pane-base-index 1

# Enable Yazi Image Previewer
set -g allow-passthrough on
set -ga update-environment TERM
set -ga update-environment TERM_PROGRAM

# Visuals
set -g pane-border-lines "simple"

# Colors
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# Catppuccin Mocha theme (via terminal ANSI colors)
set -g status-style "fg=default,bg=default"
set -g message-style "fg=black bold,bg=colour4"
set -g mode-style "fg=black bold,bg=colour4"
set -g pane-border-style "fg=colour8"
set -g pane-active-border-style "fg=colour4"

# --- BINDINGS -----------------------------------------------------------------

# Remap prefix:  C-Space  or  º
# set -g prefix º
set -g prefix C-Space

# Reload config file
bind r source-file ~/.config/tmux/tmux.conf \; display-message " Tmux config reloaded! "

# Swap panes
bind -r C-h swap-pane -U
bind -r C-l swap-pane -D

# Swap windows
bind -r H swap-window -d -t -1
bind -r L swap-window -d -t +1

# Resize panes
bind -r h resize-pane -L 2
bind -r l resize-pane -R 2
bind -r k resize-pane -U 2
bind -r j resize-pane -D 2
bind -n C-M-f resize-pane -Z

# New session
bind S command-prompt -p "Session name:" "new-session -s '%%'"

# New window
bind c new-window -c "#{pane_current_path}"

# Split panes using v and b
bind -n C-M-v split-window -h -c "#{pane_current_path}"
bind -n C-M-b split-window -v -c "#{pane_current_path}"

# Switch panes no-prefix
bind -n C-h select-pane -L
bind -n C-l select-pane -R
bind -n C-j select-pane -D
bind -n C-k select-pane -U

# Switch windows
bind -n C-M-h previous-window
bind -n C-M-l next-window

# Switch sessions
bind -n C-M-j switch-client -p
bind -n C-M-k switch-client -n

# Better yanking
# bind Enter copy-mode
bind C-Space copy-mode
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi r send-keys -X rectangle-toggle
bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel
# bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-selection
unbind -T copy-mode-vi MouseDragEnd1Pane
set-hook -g pane-mode-changed { if -F "#{pane_in_mode}" "selectp -P bg=#181825" "selectp -P default" }
bind-key -T copy-mode-vi a send-keys -X copy-selection \; run-shell "$HOME/.config/tmux/scripts/ai-ask-selection.sh"

# Popup Windows
## https://blog.meain.io/2020/tmux-flating-scratch-terminal
## https://github.com/sxyazi/yazi/issues/2308#issuecomment-2731102243
# bind-key Space display-popup -d '#{pane_current_path}' -xC -yC -h85% -w85% -E 'tmux new-session yazi \; set status off'
# bind-key C-Space display-popup -d '#{pane_current_path}' -xC -yC -h85% -w85% -E 'tmux new-session fish \; set status off'

# --- PLUGINS ------------------------------------------------------------------

set -g @plugin 'tmux-plugins/tpm'

set -g @plugin 'tmux-plugins/tmux-sensible'

set -g @plugin 'tmux-plugins/tmux-resurrect'
  set -g @resurrect-capture-pane-contents 'on'

set -g @plugin 'tmux-plugins/tmux-continuum'
  set -g @continuum-restore 'on'
  set -g @continuum-save-interval '1'
  set -g @continuum-status-on-wrap-style " "

set -g @plugin 'omerxx/tmux-floax'
  set -g @floax-bind '-n M-f'

set -g @plugin 'tmux-plugins/tmux-open'

set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-copycat'

run '~/.config/tmux/plugins/tpm/tpm'

# --- STATUSBAR ----------------------------------------------------------------

set -g status-interval 20
set -g status-position top

set -g status-justify centre
set -g status-left "\
#{?client_prefix,#[fg=colour1 bold]#S,#S} \
#(~/.dotfiles/configs/tmux/scripts/icon.sh tmux)"
set -g status-right "\
#[fg=colour7 none]%d %b %H:%M\
#(~/.config/tmux/plugins/tmux-continuum/scripts/continuum_save.sh)"
set -g window-status-format "\
#{?window_zoomed_flag,#[fg=colour4],#[fg=colour7]} \
#(~/.dotfiles/configs/tmux/scripts/icon.sh '#{pane_current_command}' '#{b:pane_current_path}')"
set -g window-status-current-format "\
#{?window_zoomed_flag,#[fg=colour3 bold],#[fg=colour1 bold]} \
#(~/.dotfiles/configs/tmux/scripts/icon.sh '#{pane_current_command}' '#{b:pane_current_path}')"
