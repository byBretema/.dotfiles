[[language]]
name = "cpp"
auto-format = false
formatter = { command = 'clang-format' }

[[language]]
name = 'bash'
indent = { tab-width = 4, unit = ' ' }

[[language]]
name = "python"
auto-format = true
scope = "source.python"
language-servers = ["pyright", "ruff"]
formatter = { command = "black", args = ["-", "--quiet", "--line-length=120"] }

[[language]]
name = "rust"
auto-format = true

[[language]]
name = "odin"
auto-format = true
scope = "scope.odin" # "source.odin"
file-types = ["odin"]
# roots = ["ols.json"]
language-servers = [ "ols" ]
comment-token = "//"
indent = { tab-width = 4, unit = " " }
injection-regex = "odin"
formatter = { command = "odinfmt", args = [ "-stdin", "true" ] }

[[language]]
name = "zig"
auto-format = true

[[language]]
name = "go"
auto-format = true

[[language]]
name = "glsl"
auto-format = true

[[language]]
name = "html"
formatter = { command = "prettier", args = ["--parser", "html"] }
auto-format = true

[[language]]
name = "json"
formatter = { command = "prettier", args = ["--parser", "json"] }
auto-format = true

[[language]]
name = "css"
formatter = { command = "prettier", args = ["--parser", "css"] }
auto-format = true

[[language]]
name = "javascript"
formatter = { command = "prettier", args = ["--parser", "typescript"] }
auto-format = true

[[language]]
name = "typescript"
formatter = { command = "prettier", args = ["--parser", "typescript"] }
auto-format = true

[[language]]
name = "markdown"
formatter = { command = "prettier", args = ["--parser", "markdown"] }
auto-format = true
comment-tokens = ["-", "+", "*", "- [ ]", ">"]

[[language]]
name = "lua"
auto-format = true

[language.auto-pairs]
'(' = ')'
'{' = '}'
'[' = ']'
'"' = '"'
'`' = '`'
'<' = '>'


#! Python settings

[language-server.ruff]
command = "ruff-lsp"

[language-server.pyright]
command = "pyright-langserver"
args = ["--stdio"]
config = {}

#! Odin extras

[[grammar]]
name = "odin"
#source = { git = "https://github.com/ap29600/tree-sitter-odin", rev = "b219207e49ffca2952529d33e94ed63b1b75c4f1" }
source = { git = "https://github.com/amaanq/tree-sitter-odin" }
