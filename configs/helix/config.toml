#
# Typ(o)ed @byBretema
#
# NOTES:
# For iso/us keyboards, replace any 'ñ' with ';'

theme = "bretema"

# --- EDITOR -------------------------------------------------------------------

[editor]
# Tough opinions
mouse = true
default-yank-register = "+"
smart-tab.enable = false
# Visuals
true-color = true
cursorline = true
color-modes = true
bufferline = "never"
rulers = [80, 100, 120]
line-number = "relative"
end-of-line-diagnostics = "hint"
# Completions
auto-pairs = false
completion-timeout = 5
completion-replace = true
completion-trigger-len = 1
# File behaviors
default-line-ending = "lf"
insert-final-newline = true
trim-trailing-whitespace = true
# goto_word -> home-row centric + no qpzm (low pinky movement)
jump-label-alphabet = "jfkdlsñaurieownvmc"

[editor.auto-save]
focus-lost = true
after-delay.enable = true
after-delay.timeout = 1100

[editor.statusline]
separator = "·"
left  = ["mode", "file-name", "spinner", "read-only-indicator", "file-modification-indicator"]
right = ["file-type", "file-encoding", "file-line-ending", "position", "diagnostics", "workspace-diagnostics"]
mode.normal = "N"
mode.insert = "I"
mode.select = "S"

[editor.soft-wrap]
enable = true

[editor.whitespace]
render = "none"

[editor.whitespace.characters]
space = "·"
nbsp = "⍽"
nnbsp = "␣"
tab = "→"
newline = "⏎"
tabpad = "·"

[editor.indent-guides]
render = true
skip-levels = 1
character = "┊" # Some nice chars: "▏", "┆", "┊", "⸽"

[editor.cursor-shape]
insert = "bar"
normal = "block"
select = "underline"

[editor.file-picker]
hidden = false
git-ignore = true
git-global = true
git-exclude = true

[editor.inline-diagnostics]
cursor-line = "warning"

[editor.lsp]
display-messages = true
auto-signature-help = true
display-inlay-hints = false
display-progress-messages = true
# auto-document-highlight = true


# --- KEYs ---------------------------------------------------------------------

[keys.normal]
# > [keys.normal] and [keys.select] block.
# Disable
up = "no_op"
down = "no_op"
left = "no_op"
right = "no_op"
home = "no_op"
end = "no_op"
pageup = "no_op"
pagedown = "no_op"
# Replace defaults
"d" = "delete_selection_noyank"
"c" = "change_selection_noyank"
"F12" = "delete_selection"
# Word-wide shortcut
"M" = "@miwm"
"Y" = "@miwy"
# Subwords motions
"W" = "move_next_sub_word_start"
"B" = "move_prev_sub_word_start"
"E" = "move_next_sub_word_end"
# Move line up/down
"A-j" = '@X"m<F12>"mp'
"A-k" = '@X"m<F12>k"mP'
# Handy brackets in Spanish keyboard
"A-h" = "@["
"A-l" = "@]"
# More confy acces to switch case
"A-c" = "switch_case"

# > [keys.normal] Only
# Use 'esc' to unselect multiple cursors
"esc" = ["collapse_selection", "keep_primary_selection"]
# Scooter for symbol rename in the whole project
"C-r" = [
  ":write-all",
  ":insert-output scooter --no-stdin >/dev/tty",
  ":redraw",
  ":reload-all",
]

[keys.normal.g]
# > Extends GoTo actions
"j" = "goto_prev_diag"
"k" = "goto_next_diag"
"A-j" = "goto_prev_change"
"A-k" = "goto_next_change"

[keys.normal.space]
# > Extends Space actions
# 'l' for faster access to Global
"l" = "global_search"
# 'ñ/;' for faster access to : actions
"ñ" = "@:"

[keys.normal.'0']
# > Cpp Utils
# Calls custom script: Duplicates C++ files with a different name, not ideal but handy
"d" = "@:open %sh{hx_duplicate_cpp %{buffer_name}  }<C-b><C-b>"
# To paste a cpp method signature of a method into the hpp file
"p" = "@pglF(F:;vT dA;<esc>"
# Calls custom script: Switch between file-pairs .cpp/.hpp, .frag/.vert, ...
"0" = ":open %sh{hx_switch_cpp %{buffer_name}}"

[keys.normal.'9']
# > Git Utils
# Shows git blame on the status bar
"b" = ":echo %sh{git blame -L %{cursor_line},+1 %{buffer_name}}"
# Git Blame of current line
"d" = [":vsplit-new", ":lang diff", ":insert-output git diff"]
# Opens git-ui
"9" = [ ":write-all", ":insert-output lazygit >/dev/tty", ":redraw", ":reload-all", ]

[keys.normal.'+']
# > Editor/LSP/Buffers Utils
# Quit
"q" = ":q"
"Q" = ":q!"
# Config
"c" = ":config-open"
"r" = ":config-reload"
# Lang/LSP
"l" = "@:lang "
"L" = ":lsp-restart"
"s" = ":toggle lsp.auto-signature-help"
# Theme
"t" = "@:theme "
# Copy buffer name in many ways
"n" = "@:insert-output echo %{buffer_name}<ret>yu"
"N" = "@:insert-output echo %{buffer_name}:%{cursor_line}<ret>yu"
"f" = "@:insert-output echo $(pwd)/%{buffer_name}<ret>yu"
"F" = "@:insert-output echo $(pwd)/%{buffer_name}:%{cursor_line}<ret>yu"
# Toggles
"i" = ":toggle lsp.display-inlay-hints"
"b" = ":toggle bufferline never always"
"h" = ":toggle whitespace.render none all"
"." = [":toggle file-picker.git-ignore", ":toggle file-picker.ignore"]

[keys.normal.'ñ']
# > Text/File Utils + YAZI quick access
# Quick access
" " = ':o "~/notes.md"'
"ñ" = 'goto_word'
"f" = ":format"
"s" = "search"
# Save/Close, Capital == force
"w" = ":w"
"W" = ":w!"
"a" = ":wa"
"A" = ":wa!"
"x" = ":bc"
"X" = ":bc!"
# Buffers stuff
"r" = ":reload-all"
# Duplicate line up/down
"j" = '@X"dy"dp'
"k" = '@X"dy"dP'
# Actions over a whole word
"l" = "@miw*"
"L" = "@miw<A-*>"
"y" = "@miwy"
"c" = "@miwc"
"R" = "@miwR"
"d" = "@miw*v"           # Mimics Ctrl+D of VSCode, select word and enter select mode, then press 'n' to iterate
"D" = "@miw*%s<ret>"     # Similar to 'd' but select all matches in the file
"m" = "@miw<A-*>v"       # Same as 'd' but matches partial text not full words only
"M" = "@miw<A-*>%s<ret>" # Same as 'm' but select all matches in the file
# Opens YAZI explorer
"tab" = [
  ":write-all",
  ":sh rm -f /tmp/hx_yazi.result",
  ':insert-output yazi "%{buffer_name}" --chooser-file=/tmp/hx_yazi.result',
  ':sh printf "\x1b[?1049h\x1b[?2004h" > /dev/tty',
  ":open %sh{cat /tmp/hx_yazi.result}",
  ":redraw",
  ":set mouse false",
  ":set mouse true",
]

[keys.select]
# > [keys.normal] and [keys.select] block.
# Disable
up = "no_op"
down = "no_op"
left = "no_op"
right = "no_op"
home = "no_op"
end = "no_op"
pageup = "no_op"
pagedown = "no_op"
# Replace defaults
"d" = "delete_selection_noyank"
"c" = "change_selection_noyank"
"F12" = "delete_selection"
# Word-wide shortcut
"M" = "@miwm"
"Y" = "@miwy"
# Subwords motions
"W" = "move_next_sub_word_start"
"B" = "move_prev_sub_word_start"
"E" = "move_next_sub_word_end"
# Move line up/down
"A-j" = '@X"m<F12>"mp'
"A-k" = '@X"m<F12>k"mP'
# Handy brackets in Spanish keyboard
"A-h" = "@["
"A-l" = "@]"
# More confy acces to switch case
"A-c" = "switch_case"

