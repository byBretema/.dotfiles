
theme = "bretema"

[editor]
# mouse = true  # 'true' to ensure scroll doesn't break the buffer
true-color = true
color-modes = true
# bufferline = "multiple"
line-number = "relative"
scroll-lines = 1
# breadcrumbs = true
cursorline = true
rulers = [80, 100, 120]

# completion-replace = true
default-yank-register = '+'

default-line-ending = "lf"
insert-final-newline = true
trim-trailing-whitespace = true
end-of-line-diagnostics = "hint"
# popup-border = "all"

[editor.auto-save]
focus-lost = true

[editor.statusline]
left = [
    "mode",
    "spinner",
    "file-name",
    "file-modification-indicator",
    "read-only-indicator",
]
# center = [
# ]
right = [
    "version-control",
    "spacer",
    "separator",
    "position",
    "separator",
    "selections",
    "primary-selection-length",
    "separator",
    "file-type",
    "separator",
    "file-encoding",
    "file-line-ending",
    "separator",
    "spacer",
    "diagnostics",
    "workspace-diagnostics"
]

[editor.soft-wrap]
enable = true

[editor.indent-guides]
render = true
character = "┆" # Some nice chars: "▏", "┆", "┊", "⸽"
skip-levels = 1

[editor.cursor-shape]
insert = "bar"
normal = "block"
select = "underline"

[editor.file-picker]
hidden = false

[editor.inline-diagnostics]
cursor-line = "warning"

[editor.lsp]
display-messages = true
display-progress-messages = true
display-inlay-hints = true
auto-signature-help = true
# goto-definition-marker-style = "underline"

[keys.normal]

"ñ" = "command_mode"
"C-n" = "page_cursor_half_down"
"C-p" = "page_cursor_half_up"

# Disable arrows
up = "no_op"
down = "no_op"
left = "no_op"
right = "no_op"
home = "no_op"
end = "no_op"
pageup = "no_op"
pagedown = "no_op"

# # Line selection reverse operator
# "A-x" = "select_line_above"

# # Subwords motions
# "W" = "move_next_sub_word_start"
# "B" = "move_prev_sub_word_start"
# "E" = "move_next_sub_word_end"

# Use 'esc' to unselect multiple cursors
"esc" = ["collapse_selection", "keep_primary_selection"]

# Move line up/down
"A-j" = [ "extend_to_line_bounds", "delete_selection", "paste_after" ]
"A-k" = [ "extend_to_line_bounds", "delete_selection", "move_line_up", "paste_before" ]

# VSCode like select next ocurrence (Normal)
# "C-d" = ["keep_primary_selection", "move_prev_word_start", "move_next_word_end", "search_selection", "select_mode"]

# Reload all files (maybe edited in other editor)
# "C-r" = [":reload-all"]

# Go next/prev paragraph
"}" = "goto_next_paragraph"
"{" = "goto_prev_paragraph"

# Scooter for symbol rename (?)
# "C-r" = [
#     ":write-all",
#     ":insert-output scooter >/dev/tty",
#     ":redraw",
#     ":reload-all"
# ]

[keys.normal.space]

"l" = "global_search"
"m" = "suspend"

[keys.normal.space.space]

"w" = ":w"
"a" = ":wa"
"q" = ":q"
"x" = ":bc"
"r" = ":reload-all"
"c" = ":config-open"
"C" = ":config-reload"

# Opens YAZI explorer
"f" = [
  ":write-all",
  ":sh rm -f /tmp/helix_yazi_link",
  ":insert-output yazi '%{buffer_name}' --chooser-file=/tmp/helix_yazi_link",
  ":insert-output echo \"x1b[?1049h\" > /dev/tty",
  ":open %sh{cat /tmp/helix_yazi_link}",
  ":redraw",
  ":set mouse false",
  ":set mouse true",
]

[keys.normal.space.space.g]

# Opens git-ui
"f" = [
    ":write-all",
    ":insert-output gitui >/dev/tty",
    ":redraw",
    ":reload-all"
]

# Git Blame of current line
# "b" = ":echo %sh{git blame -L %{cursor_line},+1 %{buffer_name}}"
"b" = ":sh git blame -L %{cursor_line},+1 %{buffer_name}"


