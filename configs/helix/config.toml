
theme = "bretema"

[editor]
mouse                    = false
true-color               = true
color-modes              = true
line-number              = "relative"
scroll-lines             = 1
cursorline               = true
rulers                   = [80, 100, 120]
default-yank-register    = '+'
default-line-ending      = "lf"
insert-final-newline     = true
trim-trailing-whitespace = true
end-of-line-diagnostics  = "hint"
completion-trigger-len   = 1

[editor.auto-save]
focus-lost         = true
after-delay.enable = true

[editor.statusline]
separator = "┆"
left      = [ "mode", "spinner", "file-name", "spacer", "file-modification-indicator", "read-only-indicator" ]
center    = [ "version-control" ]
right     = [
    "separator",
    "position",
    "separator",
    "selections",
    "primary-selection-length",
    "separator",
    "file-type",
    "separator",
    "file-encoding",
    "file-line-ending",
    "separator",
    "spacer",
    "diagnostics",
    "separator",
    "workspace-diagnostics"
]

[editor.soft-wrap]
enable = true

[editor.whitespace]
render = "none"

[editor.whitespace.characters]
space   = "·"
nbsp    = "⍽"
nnbsp   = "␣"
tab     = "→"
newline = "⏎"
tabpad  = "·"

[editor.indent-guides]
render      = true
character   = "┆" # Some nice chars: "▏", "┆", "┊", "⸽"
skip-levels = 1

[editor.cursor-shape]
insert = "bar"
normal = "block"
select = "underline"

[editor.file-picker]
hidden      = false
git-ignore  = true
git-global  = true
git-exclude = true

[editor.inline-diagnostics]
cursor-line = "warning"

[editor.lsp]
display-messages          = true
display-progress-messages = true
display-inlay-hints       = true
auto-signature-help       = true

[keys.normal]

"C-n" = "page_cursor_half_down"
"C-p" = "page_cursor_half_up"

# Disable arrows
up       = "no_op"
down     = "no_op"
left     = "no_op"
right    = "no_op"
home     = "no_op"
end      = "no_op"
pageup   = "no_op"
pagedown = "no_op"

# Subwords motions
"W" = "move_next_sub_word_start"
"B" = "move_prev_sub_word_start"
"E" = "move_next_sub_word_end"

# Use 'esc' to unselect multiple cursors
"esc" = ["collapse_selection", "keep_primary_selection"]

# Move line up/down
"A-j" = [ "extend_to_line_bounds", "delete_selection", "paste_after" ]
"A-k" = [ "extend_to_line_bounds", "delete_selection", "move_line_up", "paste_before" ]

# Goto next/prev buffer
"A-h" = ":buffer-previous"
"A-l" = ":buffer-next"

# Go next/prev paragraph
"}" = "goto_next_paragraph"
"{" = "goto_prev_paragraph"

# Scooter for symbol rename (?)
"C-r" = [
    ":write-all",
    ":insert-output scooter --no-stdin >/dev/tty",
    ":redraw",
    ":reload-all"
]

[keys.normal.g]

j = "jump_backward"
k = "jump_forward"

[keys.normal.space]

"l" = "global_search"
"m" = "suspend"

[keys.normal.'ñ']

"ñ" = "goto_word"
"k" = "global_search"
"w" = ":w"
"a" = ":wa"
"q" = ":q"
"x" = ":bc"
"r" = ":reload-all"
"c" = ":config-open"
"C" = ":config-reload"
"i" = ":toggle lsp.display-inlay-hints"

"h" = [
    ":toggle file-picker.git-ignore",
    ":toggle file-picker.git-exclude",
    ":toggle file-picker.git-global",
]

# Opens YAZI explorer
"f" = [
  ':write-all',
  ':sh rm -f /tmp/unique-file-h21a434',
  ':insert-output yazi "%{buffer_name}" --chooser-file=/tmp/unique-file-h21a434',
  ':sh printf "\x1b[?1049h\x1b[?2004h" > /dev/tty',
  ':open %sh{cat /tmp/unique-file-h21a434}',
  ':redraw',
  ':set mouse false',
  ':set mouse true',
]

# Opens git-ui
"g" = [
    ":write-all",
    ":insert-output lazygit >/dev/tty",
    ":redraw",
    ":reload-all"
]

# Git Blame of current line
# "b" = ":echo %sh{git blame -L %{cursor_line},+1 %{buffer_name}}"
"b" = ":sh git blame -L %{cursor_line},+1 %{buffer_name}"


[keys.select]

# Subwords motions
"W" = 'extend_next_sub_word_start'
"B" = 'extend_prev_sub_word_start'
"E" = 'extend_next_sub_word_end'

# Move line up/down
"A-j" = [ "extend_to_line_bounds", "delete_selection", "paste_after" ]
"A-k" = [ "extend_to_line_bounds", "delete_selection", "move_line_up", "paste_before" ]


