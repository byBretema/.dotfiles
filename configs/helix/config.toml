theme = "bretema"

# --- EDITOR -------------------------------------------------------------------

[editor]
mouse = true
true-color = true
color-modes = true
# rainbow-brackets         = true
completion-replace = true
line-number = "relative"
scroll-lines = 1
cursorline = true
rulers = [80, 100, 120]
default-yank-register = "+"
default-line-ending = "lf"
insert-final-newline = true
trim-trailing-whitespace = true
end-of-line-diagnostics = "hint"
completion-trigger-len = 1
bufferline = "never"

[editor.auto-save]
focus-lost = true
after-delay.enable = true
after-delay.timeout = 600

[editor.statusline]
separator = "┆"
left = [
  "mode",
  "spinner",
  "file-name",
  "spacer",
  "file-modification-indicator",
  "read-only-indicator"
]
right = [
  "version-control",
  "spacer",
  "separator",
  "file-type",
  "separator",
  "file-encoding",
  "file-line-ending",
  "separator",
  "position",
  "separator",
  "spacer",
  "diagnostics",
  "separator",
  "workspace-diagnostics"
]

[editor.soft-wrap]
enable = true

[editor.whitespace]
render = "none"

[editor.whitespace.characters]
space = "·"
nbsp = "⍽"
nnbsp = "␣"
tab = "→"
newline = "⏎"
tabpad = "·"

[editor.indent-guides]
render = true
character = "┆"  # Some nice chars: "▏", "┆", "┊", "⸽"
skip-levels = 1

[editor.cursor-shape]
insert = "bar"
normal = "block"
select = "underline"

[editor.file-picker]
hidden = false
git-ignore = true
git-global = true
git-exclude = true

[editor.inline-diagnostics]
cursor-line = "warning"

[editor.lsp]
display-inlay-hints = false
display-messages = true
auto-signature-help = true
display-progress-messages = true


# --- KEYs ---------------------------------------------------------------------

[keys.normal]
# > [keys.select] should be the same as this except Scooter.

# Disable
# "tab" = "no_op"
up = "no_op"
down = "no_op"
left = "no_op"
right = "no_op"
home = "no_op"
end = "no_op"
pageup = "no_op"
pagedown = "no_op"

# Replace defaults
"d" = "delete_selection_noyank"
"c" = "change_selection_noyank"
"F12" = "delete_selection"

# Scroll
"C-n" = "page_cursor_half_down"
"C-p" = "page_cursor_half_up"

# Word-wide shortcut
"M" = "@miwm"
"Y" = "@miwy"

# Subwords motions
"W" = "move_next_sub_word_start"
"B" = "move_prev_sub_word_start"
"E" = "move_next_sub_word_end"

# Use 'esc' to unselect multiple cursors
"esc" = ["collapse_selection", "keep_primary_selection"]

# Move line up/down
"A-j" = '@X"m<F12>"mp'
"A-k" = '@X"m<F12>k"mP'

# Goto next/prev buffer
"A-h" = ":buffer-previous"
"A-l" = ":buffer-next"

# Go next/prev paragraph
"}" = "goto_next_paragraph"
"{" = "goto_prev_paragraph"

# Scooter for symbol rename in the whole project
"C-r" = [
  ":write-all",
  ":insert-output scooter --no-stdin >/dev/tty",
  ":redraw",
  ":reload-all"
]


[keys.normal.g]
# > Extends GoTo actions

j = "goto_prev_diag"
k = "goto_next_diag"


[keys.normal.space]
# > Extends Space actions

# Custom search UI made with: rg + fzf + bat
" " = [
  ":write-all",
  ":insert-output hx-fzfg",
  ":open %sh{cat /tmp/hx-fzfg.result}",
  ":redraw",
  ":reload-all"
]


[keys.normal.'0']
# > Cpp Utils

# Calls custom script: Duplicates C++ files with a different name, not ideal but handy
"d" = "@:open %sh{hx_duplicate_cpp %{buffer_name}  }<C-b><C-b>"

# To paste a cpp method signature of a method into the hpp file
"p" = "@pglF(F:;vT dA;<esc>"

# Calls custom script: Switch between file-pairs .cpp/.hpp, .frag/.vert, ...
"0" = ":open %sh{hx_switch_cpp %{buffer_name}}"


[keys.normal.'9']
# > Git Utils

# Shows git blame on the status bar
"b" = ":echo %sh{git blame -L %{cursor_line},+1 %{buffer_name}}"

# Git Blame of current line
"d" = [":vsplit-new", ":lang diff", ":insert-output git diff"]

# Opens git-ui
"9" = [
  ":write-all",
  ":insert-output lazygit >/dev/tty",
  ":redraw",
  ":reload-all"
]


[keys.normal.'+']
# > Editor/LSP/Buffers Utils

"q" = ":q"
"Q" = ":q!"

"c" = ":config-open"
"r" = ":config-reload"

"l" = "@:lang "
"L" = ":lsp-restart"

"t" = "@:theme "

"n" = "@:insert-output echo %{buffer_name}<ret>yu"
"N" = "@:insert-output echo %{buffer_name}:%{cursor_line}<ret>yu"
"f" = "@:insert-output echo $(pwd)/%{buffer_name}<ret>yu"
"F" = "@:insert-output echo $(pwd)/%{buffer_name}:%{cursor_line}<ret>yu"

"i" = ":toggle lsp.display-inlay-hints"
"b" = ":toggle bufferline never always"
"h" = ":toggle whitespace.render none all"
"." = [":toggle file-picker.git-ignore", ":toggle file-picker.ignore"]


[keys.normal.'ñ']
# > Text/File Utils + YAZI quick access

" " = ':o "~/notes.md"'

"w" = ":w"
"W" = ":w!"
"a" = ":wa"
"A" = ":wa!"
"x" = ":bc"
"X" = ":bc!"

"k" = "@]"
"j" = "@["

"f" = ":format"
"r" = ":reload-all"

"l" = "@miw*"
"L" = "@miw<A-*>"

"y" = "@miwy"
"c" = "@miwc"
"R" = "@miwR"

"d" = "@miw*v"  # Mimics Ctrl+D of VSCode, select word and enter select mode, then press 'n' to iterate
"D" = "@miw*%s<ret>"  # Similar to 'd' but select all matches in the file
"m" = "@miw<A-*>v"  # Same as 'd' but matches partial text not full words only
"M" = "@miw<A-*>%s<ret>"  # Same as 'm' but select all matches in the file

# Opens YAZI explorer
"ñ" = [
  ":write-all",
  ":sh rm -f /tmp/unique-file-h21a434",
  ':insert-output yazi "%{buffer_name}" --chooser-file=/tmp/unique-file-h21a434',
  ':sh printf "\x1b[?1049h\x1b[?2004h" > /dev/tty',
  ":open %sh{cat /tmp/unique-file-h21a434}",
  ":redraw",
  ":set mouse false",
  ":set mouse true",
]


