theme = "bretema"

[editor]
mouse                    = true
true-color               = true
color-modes              = true
# rainbow-brackets         = true
completion-replace       = true
line-number              = "relative"
scroll-lines             = 1
cursorline               = true
rulers                   = [80, 100, 120]
default-yank-register    = '+'
default-line-ending      = "lf"
insert-final-newline     = true
trim-trailing-whitespace = true
end-of-line-diagnostics  = "hint"
completion-trigger-len   = 1
bufferline               = "always"

[editor.auto-save]
focus-lost         = true
after-delay.enable = true

[editor.statusline]
separator = "┆"
left      = [ "mode", "spinner", "file-name", "spacer", "file-modification-indicator", "read-only-indicator" ]
center    = [ "version-control" ]
right     = [ "file-type", "separator", "file-encoding", "file-line-ending", "separator", "position", "separator", "spacer", "diagnostics", "separator", "workspace-diagnostics" ]

[editor.soft-wrap]
enable = true

[editor.whitespace]
render = "none"

[editor.whitespace.characters]
space   = "·"
nbsp    = "⍽"
nnbsp   = "␣"
tab     = "→"
newline = "⏎"
tabpad  = "·"

[editor.indent-guides]
render      = true
character   = "┆" # Some nice chars: "▏", "┆", "┊", "⸽"
skip-levels = 0

[editor.cursor-shape]
insert = "bar"
normal = "block"
select = "underline"

[editor.file-picker]
hidden      = false
git-ignore  = true
git-global  = true
git-exclude = true

[editor.inline-diagnostics]
cursor-line = "warning"

[editor.lsp]
display-messages          = true
display-progress-messages = true
display-inlay-hints       = true
auto-signature-help       = true

[keys.normal]

"C-n" = "page_cursor_half_down"
"C-p" = "page_cursor_half_up"

# Disable arrows
up       = "no_op"
down     = "no_op"
left     = "no_op"
right    = "no_op"
home     = "no_op"
end      = "no_op"
pageup   = "no_op"
pagedown = "no_op"

# Subwords motions
"W" = "move_next_sub_word_start"
"B" = "move_prev_sub_word_start"
"E" = "move_next_sub_word_end"

# Use 'esc' to unselect multiple cursors
"esc" = ["collapse_selection", "keep_primary_selection"]

# Move line up/down
"A-j" = [ "extend_to_line_bounds", "delete_selection", "paste_after" ]
"A-k" = [ "extend_to_line_bounds", "delete_selection", "move_line_up", "paste_before" ]

# Goto next/prev buffer
"A-h" = ":buffer-previous"
"A-l" = ":buffer-next"

# Go next/prev paragraph
"}" = "goto_next_paragraph"
"{" = "goto_prev_paragraph"

# Scooter for symbol rename (?)
"C-r" = [
    ":write-all",
    ":insert-output scooter --no-stdin >/dev/tty",
    ":redraw",
    ":reload-all"
]

[keys.normal.g]

j = "goto_prev_diag"
k = "goto_next_diag"

[keys.normal.space]

"l" = "global_search"
"m" = "suspend"

[keys.normal.'+']

"d" = "@:open %sh{hx_duplicate_cpp %{buffer_name}  }<C-b><C-b>"

"c" = ":config-open"
"C" = ":config-reload"

[keys.normal.'ñ']

"ñ" = "goto_word"

"w" = ":w"
"W" = ":w!"
"a" = ":wa"
"A" = ":wa!"
"q" = ":q"
"Q" = ":q!"
"x" = ":bc"
"X" = ":bc!"

"k" = "@]"
"j" = "@["

"l" = "@:lang "
"f" = ":format"
"r" = ":reload-all"

"i" = ":toggle lsp.display-inlay-hints"
"b" = ":toggle bufferline never always"
"h" = ":toggle whitespace.render none all"
"." = ":toggle file-picker.git-ignore"

"d" = "@miw*v"           # Mimics Ctrl+D of VSCode, select word and enter select mode, then press 'n' to iterate
"D" = "@miw*%s<ret>"     # Similar to 'd' but select all matches in the file
"m" = "@miw<A-*>v"       # Same as 'd' but matches partial text not full words only
"M" = "@miw<A-*>%s<ret>" # Same as 'm' but select all matches in the file

# Calls a script, enables switch between .cpp and .hpp files
"o" = ":open %sh{hx_switch_cpp %{buffer_name}}"

# Opens YAZI explorer
"y" = [
  ':write-all',
  ':sh rm -f /tmp/unique-file-h21a434',
  ':insert-output yazi "%{buffer_name}" --chooser-file=/tmp/unique-file-h21a434',
  ':sh printf "\x1b[?1049h\x1b[?2004h" > /dev/tty',
  ':open %sh{cat /tmp/unique-file-h21a434}',
  ':redraw',
  ':set mouse false',
  ':set mouse true',
]

[keys.normal.'ñ'.g]

# Opens git-ui
"u" = [
    ":write-all",
    ":insert-output lazygit >/dev/tty",
    ":redraw",
    ":reload-all"
]

# Git Blame of current line
# "b" = ":sh git blame -L %{cursor_line},+1 %{buffer_name}"
"b" = ":echo %sh{git blame -L %{cursor_line},+1 %{buffer_name}}"
"d" = [":vsplit-new", ":lang diff", ":insert-output git diff"]


[keys.select]

# Subwords motions
"W" = 'extend_next_sub_word_start'
"B" = 'extend_prev_sub_word_start'
"E" = 'extend_next_sub_word_end'

# Move line up/down
"A-j" = [ "extend_to_line_bounds", "delete_selection", "paste_after" ]
"A-k" = [ "extend_to_line_bounds", "delete_selection", "move_line_up", "paste_before" ]


