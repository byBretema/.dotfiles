# Lovingly typ(o)ed @byBretema


################################################################################
##                                  SETTINGS                                  ##
################################################################################

# Allow vi-mode
set-window-option -g mode-keys vi

# set -s extended-keys on
# set -as terminal-features 'xterm*:extkeys'

# Better colors
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# Mouse
set -g mouse on

# Start numbers at 1
set-option -g renumber-windows on
set-window-option -g pane-base-index 1
set -g pane-base-index 1
set -g base-index 1

# Word separators / delimiters
setw -g word-separators ' @"=()[],:;│|+~!%'
setw -ag word-separators "'"

set-option -g status-style bg=default


################################################################################
##                                  BINDINGS                                  ##
################################################################################

# Unbind
unbind C-b
unbind '"'
unbind %

# Remap prefix
set -g prefix C-Space
# bind C-Space send-prefix  (done by tmux-sensible)

# Split panes using v and h
# bind v split-window -h -c "#{pane_current_path}"
# bind V split-window -v -c "#{pane_current_path}"
bind -n C-M-v split-window -h -c "#{pane_current_path}"
bind -n C-M-b split-window -v -c "#{pane_current_path}"

# Reload config file
bind r source-file ~/.config/tmux/tmux.conf

# Switch panes no-prefix
bind -n C-h select-pane -L
bind -n C-l select-pane -R
bind -n C-j select-pane -D
bind -n C-k select-pane -U

# Swap panes
# bind -r H swap-pane -U
# bind -r L swap-pane -D

# Swap windows
bind -r H swap-window -d -t -1
bind -r L swap-window -d -t +1

# Switch windows
bind -n C-M-h previous-window
bind -n C-M-l next-window

# Switch sessions
bind -n C-M-j switch-client -p
bind -n C-M-k switch-client -n

# Resize panes
bind-key -r h resize-pane -L 2
bind-key -r l resize-pane -R 2
bind-key -r k resize-pane -U 2
bind-key -r j resize-pane -D 2
bind-key -n C-M-f resize-pane -Z

# Better yanking
bind-key Enter copy-mode
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi r send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-selection

# Popup Windows
## https://blog.meain.io/2020/tmux-flating-scratch-terminal
## https://github.com/sxyazi/yazi/issues/2308#issuecomment-2731102243
# bind-key Space display-popup -d '#{pane_current_path}' -xC -yC -h85% -w85% -E 'tmux new-session yazi \; set status off'
# bind-key C-Space display-popup -d '#{pane_current_path}' -xC -yC -h85% -w85% -E 'tmux new-session fish \; set status off'

################################################################################
##                                  PLUGINS                                   ##
################################################################################

set -g @plugin 'tmux-plugins/tpm'

set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-copycat'

set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-resurrect'

set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @continuum-save-interval '1'
set -g @continuum-restore 'on'
set -g @continuum-status-on-wrap-style " "

run '~/.config/tmux/plugins/tpm/tpm'


################################################################################
##                                 STATUSBAR                                  ##
################################################################################

# Icons from vaaleyard/tmux-dotbar: 󰊓 (maximized), 󰌘 (ssh)

set -g status-position top
set -g status-justify centre
set -g status-left "#{?client_prefix,#[fg=black bold bg=red] #S , #S }"
set -g status-right "#(~/.config/tmux/plugins/tmux-continuum/scripts/continuum_status.sh)"
set -g window-status-format "#[fg=#7e839b][#I|#{?#{==:#{pane_current_command},ssh},󰌘 ,}#{pane_current_command}]#[fg=default] #{b:pane_current_path}#{?window_zoomed_flag, 󰊓,} "
set -g window-status-current-format "#[fg=#935a71][#I|#{?#{==:#{pane_current_command},ssh},󰌘 ,}#{pane_current_command}]#[fg=red] #{b:pane_current_path}#{?window_zoomed_flag, 󰊓,} "
