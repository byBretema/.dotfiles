# /etc/default/drm-colortemp.conf
# Configuration for DRM Color Temperature Daemon

# DRM device to use
DEVICE="/dev/dri/card2"

# Day temperature in Kelvin (1000-10000)
DAY_TEMP=6500

# Night temperature in Kelvin (1000-10000)
NIGHT_TEMP=1000

# Sunset hour (0-23)
SUNSET_HOUR=20

# Sunrise hour (0-23)
SUNRISE_HOUR=8

# TTY to monitor for automatic application
MONITOR_TTY=3

# TTY to force warm (night) temperature
WARM_TTY=4

# TTY to force cool (day) temperature
COOL_TTY=5

# Connector filter (optional) — eDP-1 for internal display
CONNECTOR=""

# Override gamma table size (0 = auto)
GAMMA_SIZE=0

# Check interval in seconds
CHECK_INTERVAL=1

# Enable verbose logging
VERBOSE=0

# Desktop notifications
NOTIFY_ENABLED=0
NOTIFY_USER=""
NOTIFY_MINUTES_BEFORE=5
